<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>For you, Tshepiso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #333;
            background: linear-gradient(135deg, #f9c5d1, #c2e9fb, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 18s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .floating-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-overlay i, .floating-overlay div {
            position: absolute;
            color: rgba(255, 192, 203, 0.3);
            font-size: 2rem;
            animation: floatShape 15s linear infinite;
            user-select: none;
        }

        @keyframes floatShape {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            padding: 20px 0 10px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #d63384;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            margin-bottom: 8px;
            animation: fadeInDown 1.5s ease;
            line-height: 1.2;
            word-break: break-word;
        }

        .subtitle {
            font-size: 1rem;
            color: #4a4a4a;
            margin-bottom: 15px;
            animation: fadeInUp 1.5s ease 0.3s both;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(3px);
            padding: 8px 12px;
            border-radius: 50px;
            display: inline-block;
            max-width: 95%;
        }

        .heart-icon {
            color: #ff4081;
            animation: heartbeat 1.5s infinite;
            margin: 0 3px;
        }

        .music-control {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s;
            border: 2px solid #ff99cc;
        }
        .music-control i {
            font-size: 1.6rem;
            color: #d63384;
        }
        .music-control:hover {
            transform: scale(1.1);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .message-box, .hope-box {
            width: 100%;
            max-width: 100%;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .message-box h2 {
            font-family: 'Dancing Script', cursive;
            color: #d63384;
            font-size: 2.2rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .message-text {
            line-height: 1.6;
            font-size: 1rem;
            color: #2d2d2d;
            text-align: left;
            transition: opacity 0.5s;
            min-height: 200px;
        }

        .hope-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hope-frame {
            width: 100%;
            height: auto;
            min-height: 280px;
            background: linear-gradient(145deg, #b3e5fc, #ffccbc);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            border: 3px solid white;
            padding: 15px;
        }

        .hope-content {
            font-size: 1.3rem;
            color: #2c3e50;
            text-align: center;
            font-family: 'Dancing Script', cursive;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .interactive-section {
            margin-top: 30px;
            text-align: center;
        }

        .interactive-section h3 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #d63384;
            margin-bottom: 10px;
        }

        .hearts-container {
            height: 120px;
            position: relative;
            margin: 15px 0;
            overflow: hidden;
            background: rgba(255,255,240,0.2);
            border-radius: 20px;
        }

        .memory-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px 10px;
            margin-top: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .memory-box h3 {
            font-family: 'Dancing Script', cursive;
            color: #d63384;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .memories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            justify-items: center;
        }

        .memory {
            background: white;
            border-radius: 18px;
            padding: 12px 6px;
            width: 100%;
            max-width: 160px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
            border: 1px solid #ffe6f0;
        }

        .memory:hover {
            transform: translateY(-5px);
        }

        .memory i {
            font-size: 1.8rem;
            color: #ff6b93;
            margin-bottom: 6px;
        }
        .memory h4 { font-size: 1rem; margin-bottom: 4px; }
        .memory p { font-size: 0.85rem; }

        footer {
            text-align: center;
            padding: 20px 0;
            color: #4a4a4a;
            font-size: 0.95rem;
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(3px);
            border-radius: 40px 40px 0 0;
        }

        .btn {
            background: linear-gradient(to right, #ff6b93, #ff8e53);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 8px 4px;
            box-shadow: 0 5px 15px rgba(255, 107, 147, 0.4);
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            border: 1px solid white;
            min-width: 140px;
            font-weight: 600;
            display: inline-block;
        }

        .btn-small {
            padding: 10px 16px;
            font-size: 0.95rem;
            min-width: 130px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 147, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .floating-heart {
            position: absolute;
            color: #ff99cc;
            opacity: 0.5;
            z-index: -1;
        }

        @media (max-width: 360px) {
            h1 { font-size: 2.4rem; }
            .subtitle { font-size: 0.9rem; }
            .message-box h2 { font-size: 2rem; }
            .memory { max-width: 140px; padding: 8px 4px; }
            .memory i { font-size: 1.6rem; }
            .memory h4 { font-size: 0.9rem; }
            .memory p { font-size: 0.8rem; }
            .btn { min-width: 120px; padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <div class="floating-overlay" id="floatingOverlay"></div>

    <audio id="loveAudio" loop preload="auto" crossorigin="anonymous">
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7538b3869c.mp3?filename=loving-you-124478.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="music-control" id="musicToggle">
        <i class="fas fa-music" id="musicIcon"></i>
    </div>

    <div class="container">
        <header>
            <h1>For you, Tshepiso</h1>
            <p class="subtitle"><i class="fas fa-heart heart-icon"></i> I wish you ......<i class="fas fa-heart heart-icon"></i></p>
        </header>

        <div class="main-content">
            <div class="message-box">
                <h2>Just so you know</h2>
                <div class="message-text" id="mainMessage">
                    <!-- random message will be injected via js -->
                </div>
                <div style="text-align: center; margin-top: 15px;">
                    <button class="btn btn-small" id="randomMessageBtn"><i class="fas fa-random"></i> Another thought</button>
                </div>
            </div>

            <div class="hope-box">
                <div class="hope-frame">
                    <div class="hope-content">
                        <i class="fas fa-dove" style="font-size: 2.8rem; color: #88c9a6; margin-bottom: 10px;"></i>
                        <p>You deserve all the good things.</p>
                        <p style="font-size: 0.95rem; font-family: 'Poppins';">Take all the time you need.</p>
                    </div>
                </div>
                <button class="btn" id="loveBtn">
                    <i class="fas fa-heart"></i> Send a gentle wish
                </button>
                <p style="margin-top: 8px; color: #555; font-size: 0.85rem;">Each click sends a little warmth your way.</p>
            </div>
        </div>

        <div class="interactive-section">
            <h3>Little reminders</h3>
            <div class="hearts-container" id="heartsContainer"></div>

            <div class="btn-group">
                <button class="btn btn-small" id="memoryBtn"><i class="fas fa-star"></i> Refresh memories</button>
                <button class="btn btn-small" id="clearBtn"><i class="fas fa-broom"></i> Clear hearts</button>
            </div>
        </div>

        <div class="memory-box">
            <h3>Things I'll always cherish about you</h3>
            <div class="memories" id="memoryGrid">
                <!-- dynamically loaded from array -->
            </div>
        </div>

        <footer>
            <p>Made with a grateful heart <i class="fas fa-heart" style="color: #ff4081;"></i></p>
            <p><span style="font-family: 'Dancing Script', cursive; font-size: 1.4rem; color: #d63384;">Given</span></p>
            <p style="margin-top: 6px; font-size: 0.85rem;">✨ I'm rooting for you, always ✨</p>
        </footer>
    </div>

    <script>
        (function() {
            // Audio control
            const audio = document.getElementById('loveAudio');
            const musicIcon = document.getElementById('musicIcon');
            const musicToggle = document.getElementById('musicToggle');
            let audioPlaying = false;

            function toggleAudio() {
                if (audioPlaying) {
                    audio.pause();
                    musicIcon.classList.remove('fa-pause');
                    musicIcon.classList.add('fa-music');
                } else {
                    audio.play().catch(e => {});
                    musicIcon.classList.remove('fa-music');
                    musicIcon.classList.add('fa-pause');
                }
                audioPlaying = !audioPlaying;
            }
            musicToggle.addEventListener('click', toggleAudio);

            // Attempt to play on first button click
            const anyButton = document.querySelectorAll('button');
            anyButton.forEach(btn => {
                btn.addEventListener('click', function initAudioOnce() {
                    if (!audioPlaying && audio.paused) {
                        audio.play().catch(()=>{});
                        audioPlaying = true;
                        musicIcon.classList.remove('fa-music');
                        musicIcon.classList.add('fa-pause');
                    }
                }, { once: true });
            });

            // ----- 50+ messages: gentle, caring, no romantic pressure, no pushing away -----
            const kinderMessages = [
    "You have such a beautiful soul, and I don't say that lightly. I hope life treats you with the same kindness you've always quietly given others—even when no one was watching.",
    "The time we shared still matters to me. Not because I'm holding on, but because it shaped something real. You'll always have a gentle place in my heart, no matter where life takes us.",
    "I hope you're finding moments of peace and joy, even in the quiet. Especially in the quiet. That's where healing often starts, without you even realizing it.",
    "You deserve to be happy—not the loud, performative kind, but the deep, steady kind that makes you feel safe in your own skin. I'm rooting for you, always, even from afar.",
    "Take care of yourself like you're someone you love, because you are. You're more precious than you've ever allowed yourself to believe, and I hope one day you see that clearly.",
    "I'm thinking of you—not with heaviness, but with warmth. Just a quiet thought that says: I hope you're okay, and if you're not, I hope you're gentle with yourself.",
    "You taught me that kindness doesn't need to be loud to be real. Thank you for that. It changed me a little, and I'm grateful for the version of me you helped shape.",
    "I hope the people around you now see how amazing you are—not because you perform it, but because you show up as yourself. You've always deserved that kind of seeing.",
    "You're one of a kind, Tshepiso. Not because you're flawless, but because you're fully you. Never let anyone make you feel like that isn't enough—because it's everything.",
    "May your days be filled with gentle moments that don't ask for anything in return. And may your heart feel light, even when life tries to weigh it down.",
    "I'm not there right now, and that's okay. But please know: my care for you doesn't depend on proximity. It's just there—quiet, steady, asking for nothing.",
    "You deserve all the love and happiness this world has to offer—not the kind that comes with conditions, but the kind that holds you exactly as you are, in every season.",
    "I'm sending you a quiet wish, not for anything dramatic, just this: may you always feel like you're enough. Because you are. You always have been.",
    "Your light doesn't fade just because someone isn't standing close to it. It's yours—it always was. Keep letting it shine, not for anyone else, but because it's who you are.",
    "I hope you're taking time for yourself—doing things that make your chest feel less tight, that bring a small smile to your face. You deserve that rest.",
    "You're stronger than you think, and braver than you believe. Not because you never break, but because you keep going even when you do. That's real strength.",
    "I'm grateful I got to know you. Not the idea of you—the real you. You're a remarkable person, and that doesn't change just because time passes or distance grows.",
    "Healing doesn't have a deadline. I hope you give yourself permission to take all the time you need, in your own way, without rushing or judging yourself.",
    "You are worthy of every good thing coming your way. Not because you earned it through suffering, but because you exist. Let that sink in.",
    "I'm not around like I used to be, but my respect and care for you haven't gone anywhere. They're just quieter now—still real, still warm, still yours.",
    "You have so much to offer the world—not by trying to impress, but by simply being present. I hope you never doubt how much that matters.",
    "On hard days, I hope you're kind to yourself. Speak to yourself the way you would to a friend you love. You deserve that same gentleness.",
    "There's a warmth about you that stays with people. It stayed with me. Not in a heavy way—just as a soft memory that makes me glad our paths crossed.",
    "I'm wishing you clarity when things feel tangled, peace when your mind races, and moments of pure, unexpected joy that remind you why life is still beautiful.",
    "You are not alone, even when it feels that way. Somewhere, someone still carries a gentle thought of you. Today, that someone is me—and I mean it softly.",
    "I hope you're still holding onto hope, even when the road ahead looks blurry. Sometimes the next step only reveals itself when you take it. Trust that.",
    "You're the kind of person who makes the world better just by being in it. Not by doing something grand—just by showing up as your real, imperfect self.",
    "I'm sending you a virtual hug—warm, gentle, and without expectation. Just a small reminder that someone cares, from a distance, with no strings attached.",
    "May you always find reasons to smile. Small ones count the most. A good song, a warm drink, a quiet sunset—they're all little gifts you deserve.",
    "You deserve to be celebrated—not for what you achieve, but for who you are when no one's watching. That's the part that matters most.",
    "I hope you're proud of who you're becoming, even if it looks different than you imagined. Growth is quiet—but it's still growth.",
    "Your future doesn't need a perfect shape to be beautiful. I hope you find freedom in the unfolding, not fear in the unknown.",
    "I'm grateful for the memories we made—not because I want to go back, but because they were real. They stay with me in a good way, and I hope they don't hurt you to remember.",
    "You are loved. Not in a dramatic, demanding way—just in a quiet, steady way. Even from a distance. Even without words. That love doesn't vanish.",
    "I hope you're taking up space without guilt, letting yourself be seen without shrinking. You have every right to exist fully and loudly if you want to.",
    "You're not defined by any relationship—past or present. You are whole on your own. That wholeness has always been yours, even when you forgot it.",
    "I hope you're finding strength in the little things. A deep breath. A moment of quiet. A small win. That's where resilience lives, not in grand gestures.",
    "You are enough. Exactly as you are. Not when you're fixed. Not when you're happier. Right now. This version of you is already worthy.",
    "I'm wishing you soft days that don't demand much, and peaceful nights where your mind finally rests. You've earned both.",
    "You're a gem, Tshepiso. Not because you sparkle for others, but because you've stayed real through everything. Don't let anyone—including yourself—dull that.",
    "I hope you're listening to music that moves your soul and laughing until your stomach hurts. Those small joys are more important than we give them credit for.",
    "You deserve a life that feels good on the inside—not impressive on the outside. Quiet contentment is its own kind of victory, and I hope you find it.",
    "I'm grateful for every conversation, every laugh, every silence we shared. None of it was wasted. It all mattered, and it still does—lightly, kindly.",
    "You're not forgotten. You're thought of with warmth—not weight, not pressure. Just a soft 'I hope they're okay' that floats your way now and then.",
    "I hope you're being patient with yourself. Growth doesn't announce itself. It happens in the small, unnoticed moments—like how you handled something better than last time.",
    "You are a beautiful soul. Crossing paths with you was an honor, and that honor doesn't fade just because we're walking different roads now.",
    "May you always feel free to be exactly who you are—without performance, without apology, without needing anyone's permission.",
    "I'm sending you good energy and warm wishes—not because I expect anything back, but because some care doesn't expire. It just becomes quieter.",
    "You matter. Not because of what you do for others, but because you exist. That alone is enough. That alone always will be.",
    "I hope you're finding your own path, at your own pace—not running from anything, not chasing anything. Just walking in a way that feels true to you."
];

            const messageContainer = document.getElementById('mainMessage');
            function setRandomMessage() {
                const randomIndex = Math.floor(Math.random() * thoughtfulMessages.length);
                const message = thoughtfulMessages[randomIndex];
                messageContainer.innerHTML = `<p>${message}</p>`;
                messageContainer.style.opacity = 0.5;
                setTimeout(() => { messageContainer.style.opacity = 1; }, 20);
            }
            setRandomMessage();
            document.getElementById('randomMessageBtn').addEventListener('click', setRandomMessage);

            // ----- Expanded quality catalog (unchanged) -----
            const qualityCatalog = [
                {icon: 'fa-smile-beam', title: 'Your smile', text: 'It lights up everything'},
                {icon: 'fa-brain', title: 'Your mind', text: 'So sharp and curious'},
                {icon: 'fa-heart', title: 'Your heart', text: 'Pure and generous'},
                {icon: 'fa-laugh', title: 'Your laugh', text: 'Contagious joy'},
                {icon: 'fa-hand-holding-heart', title: 'Kindness', text: 'You care deeply'},
                {icon: 'fa-feather-alt', title: 'Gentleness', text: 'You make people feel safe'},
                {icon: 'fa-crown', title: 'Strength', text: 'You overcome so much'},
                {icon: 'fa-sparkles', title: 'Authenticity', text: 'Always true to yourself'},
                {icon: 'fa-sun', title: 'Warmth', text: 'You radiate it'},
                {icon: 'fa-moon', title: 'Mystery', text: 'Intriguing and deep'},
                {icon: 'fa-dove', title: 'Peace', text: 'You bring calm'},
                {icon: 'fa-star', title: 'Brilliance', text: 'You shine bright'},
                {icon: 'fa-ice-cream', title: 'Sweetness', text: 'Like your favorite treat'},
                {icon: 'fa-walking', title: 'Patience', text: 'You listened'},
                {icon: 'fa-cloud-sun', title: 'Hope', text: 'You give it'},
                {icon: 'fa-gift', title: 'Surprise', text: 'Full of wonder'},
                {icon: 'fa-phone-alt', title: 'Late talks', text: 'I’ll miss them'},
                {icon: 'fa-birthday-cake', title: 'Celebration', text: 'You make life festive'},
                {icon: 'fa-eye', title: 'Perception', text: 'You see the unseen'},
                {icon: 'fa-hands-helping', title: 'Generosity', text: 'You give freely'},
                {icon: 'fa-peace', title: 'Grace', text: 'You move with it'},
                {icon: 'fa-seedling', title: 'Growth', text: 'You inspire it'},
                {icon: 'fa-water', title: 'Fluidity', text: 'You adapt with ease'},
                {icon: 'fa-wind', title: 'Freedom', text: 'You let things be'},
                {icon: 'fa-tree', title: 'Rootedness', text: 'You know yourself'},
                {icon: 'fa-cloud', title: 'Daydreams', text: 'You get lost in them'},
                {icon: 'fa-camera', title: 'Perspective', text: 'You capture beauty'},
                {icon: 'fa-compass', title: 'Direction', text: 'You find your way'},
                {icon: 'fa-dragon', title: 'Courage', text: 'You face fears'},
                {icon: 'fa-feather', title: 'Lightness', text: 'You lift others'},
                {icon: 'fa-fish', title: 'Flow', text: 'You go with it'},
                {icon: 'fa-kiwi-bird', title: 'Uniqueness', text: 'One of a kind'},
                {icon: 'fa-otter', title: 'Playfulness', text: 'You know how to have fun'}
            ];

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function renderRandomQualities() {
                const shuffled = shuffleArray([...qualityCatalog]);
                const selected = shuffled.slice(0, 8);
                const grid = document.getElementById('memoryGrid');
                grid.innerHTML = '';
                selected.forEach(q => {
                    const div = document.createElement('div');
                    div.className = 'memory';
                    div.innerHTML = `<i class="fas ${q.icon}"></i><h4>${q.title}</h4><p>${q.text}</p>`;
                    grid.appendChild(div);
                });
            }

            renderRandomQualities();

            function createFloatingShapes() {
                const overlay = document.getElementById('floatingOverlay');
                overlay.innerHTML = '';
                const shapes = ['fa-heart', 'fa-star', 'fa-circle', 'fa-dove', 'fa-feather', 'fa-sun', 'fa-moon', 'fa-hand-holding-heart'];
                for (let i = 0; i < 20; i++) {
                    const el = document.createElement('i');
                    const shape = shapes[Math.floor(Math.random() * shapes.length)];
                    el.className = `fas ${shape}`;
                    const size = Math.floor(Math.random() * 25 + 10);
                    el.style.fontSize = size + 'px';
                    el.style.left = Math.random() * 100 + '%';
                    el.style.animationDuration = Math.floor(Math.random() * 15 + 10) + 's';
                    el.style.animationDelay = Math.random() * 5 + 's';
                    el.style.color = `rgba(255, ${Math.floor(Math.random()*100+100)}, 200, 0.2)`;
                    overlay.appendChild(el);
                }
            }
            createFloatingShapes();

            document.getElementById('loveBtn').addEventListener('click', function() {
                const heartsContainer = document.getElementById('heartsContainer');
                const colors = ['#ff4081', '#ff6b93', '#ff8e53', '#d63384', '#ff99cc'];

                for (let i = 0; i < 6; i++) {
                    const heart = document.createElement('div');
                    heart.classList.add('floating-heart');
                    heart.innerHTML = '<i class="fas fa-heart"></i>';
                    const size = Math.random() * 30 + 15;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const left = Math.random() * 100;
                    const animDuration = Math.random() * 4 + 3;

                    heart.style.left = `${left}%`;
                    heart.style.fontSize = `${size}px`;
                    heart.style.color = color;
                    heart.style.animation = `fadeInUp ${animDuration}s ease forwards`;
                    heart.style.zIndex = '5';
                    heart.style.opacity = '0.9';
                    heartsContainer.appendChild(heart);

                    setTimeout(() => {
                        heart.remove();
                    }, animDuration * 1000);
                }

                const gentleWishes = [
                    "You are loved.",
                    "I'm rooting for you.",
                    "Take all the time you need.",
                    "You deserve happiness.",
                    "You're enough.",
                    "I'm sending you peace.",
                    "You matter.",
                    "Stay gentle with yourself.",
                    "You're on my mind.",
                    "Wishing you well.",
                    "You are precious.",
                    "May you find joy."
                ];
                const randomWish = gentleWishes[Math.floor(Math.random() * gentleWishes.length)];
                showMessage(randomWish);
            });

            document.getElementById('memoryBtn').addEventListener('click', function() {
                renderRandomQualities();
                showMessage("Memories refreshed 🌟");
            });

            document.getElementById('clearBtn').addEventListener('click', function() {
                document.getElementById('heartsContainer').innerHTML = '';
                showMessage("Hearts cleared. Breathe in peace.");
            });

            function showMessage(text) {
                const existing = document.querySelector('.floating-message');
                if (existing) existing.remove();

                const msg = document.createElement('div');
                msg.classList.add('floating-message');
                msg.textContent = text;
                msg.style.position = 'fixed';
                msg.style.top = '15px';
                msg.style.left = '50%';
                msg.style.transform = 'translateX(-50%)';
                msg.style.background = 'rgba(255, 255, 255, 0.96)';
                msg.style.padding = '10px 20px';
                msg.style.borderRadius = '40px';
                msg.style.boxShadow = '0 5px 20px rgba(0,0,0,0.2)';
                msg.style.zIndex = '1000';
                msg.style.fontWeight = '600';
                msg.style.color = '#d63384';
                msg.style.animation = 'fadeInDown 0.3s ease, fadeInUp 0.3s ease 2.5s forwards';
                msg.style.fontSize = '0.95rem';
                msg.style.maxWidth = '85%';
                msg.style.textAlign = 'center';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2800);
            }

            const hopeFrame = document.querySelector('.hope-frame');
            setInterval(() => {
                hopeFrame.style.animation = 'pulse 2s ease';
                setTimeout(() => { hopeFrame.style.animation = ''; }, 2000);
            }, 8000);

            setTimeout(() => {
                showMessage("🌼 I'm thinking of you, Tshepiso.");
            }, 500);

            const styleSheet = document.createElement("style");
            styleSheet.textContent = `@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }`;
            document.head.appendChild(styleSheet);
        })();
    </script>
</body>
</html>
